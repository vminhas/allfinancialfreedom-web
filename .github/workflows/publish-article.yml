name: Publish Article

on:
  workflow_dispatch: # Manual trigger from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'content/blog/**.mdx' # Auto-trigger when a new article is pushed

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── On push: detect newly added articles ──────────────────────────────
      - name: Detect new articles (push trigger)
        if: github.event_name == 'push'
        id: detect
        run: |
          NEW=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/blog/*.mdx' | head -1)
          if [ -z "$NEW" ]; then
            echo "No new articles detected in this push."
            echo "has_article=false" >> $GITHUB_OUTPUT
          else
            echo "New article: $NEW"
            NAME=$(basename "$NEW")
            SLUG="${NAME%.mdx}"
            TITLE=$(grep '^title:' "$NEW" | head -1 | sed 's/title: *//;s/^"//;s/"$//')
            EXCERPT=$(grep '^excerpt:' "$NEW" | head -1 | sed 's/excerpt: *//;s/^"//;s/"$//')
            echo "has_article=true" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT
          fi

      # ── On workflow_dispatch: move next draft to published ─────────────────
      - name: Check for scheduled drafts (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        id: check
        run: |
          DRAFT=$(ls content/drafts/*.mdx 2>/dev/null | head -1)
          if [ -z "$DRAFT" ]; then
            echo "No drafts found. Nothing to publish."
            echo "has_draft=false" >> $GITHUB_OUTPUT
          else
            echo "Found draft: $DRAFT"
            echo "has_draft=true" >> $GITHUB_OUTPUT
            echo "draft_file=$DRAFT" >> $GITHUB_OUTPUT
            echo "draft_name=$(basename $DRAFT)" >> $GITHUB_OUTPUT
          fi

      - name: Move draft to published
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.has_draft == 'true'
        run: |
          DRAFT="${{ steps.check.outputs.draft_file }}"
          NAME="${{ steps.check.outputs.draft_name }}"
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/^date:.*$/date: \"$TODAY\"/" "$DRAFT"
          mv "$DRAFT" "content/blog/$NAME"
          echo "Published: content/blog/$NAME"

      - name: Commit and push
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.has_draft == 'true'
        run: |
          git config user.name "AFF Auto Publisher"
          git config user.email "vick@allfinancialfreedom.com"
          git add content/blog/ content/drafts/
          git commit -m "publish: auto-publish ${{ steps.check.outputs.draft_name }}"
          git push

      - name: Extract metadata (manual trigger)
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.has_draft == 'true'
        id: meta
        run: |
          FILE="content/blog/${{ steps.check.outputs.draft_name }}"
          SLUG="${{ steps.check.outputs.draft_name }}"
          SLUG="${SLUG%.mdx}"
          TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/title: *//;s/^"//;s/"$//')
          EXCERPT=$(grep '^excerpt:' "$FILE" | head -1 | sed 's/excerpt: *//;s/^"//;s/"$//')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "excerpt=$EXCERPT" >> $GITHUB_OUTPUT

      # ── Notify Discord (both triggers) ────────────────────────────────────
      - name: Notify Discord (push trigger)
        if: github.event_name == 'push' && steps.detect.outputs.has_article == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"New Article: ${{ steps.detect.outputs.title }}\",
              \"description\": \"${{ steps.detect.outputs.excerpt }}\",
              \"url\": \"https://allfinancialfreedom.com/blog/${{ steps.detect.outputs.slug }}\",
              \"color\": 1714756,
              \"footer\": { \"text\": \"All Financial Freedom · Wealth · Protection · Legacy\" }
            }]
          }" \
          "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord (manual trigger)
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.has_draft == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"New Article: ${{ steps.meta.outputs.title }}\",
              \"description\": \"${{ steps.meta.outputs.excerpt }}\",
              \"url\": \"https://allfinancialfreedom.com/blog/${{ steps.meta.outputs.slug }}\",
              \"color\": 1714756,
              \"footer\": { \"text\": \"All Financial Freedom · Wealth · Protection · Legacy\" }
            }]
          }" \
          "$DISCORD_WEBHOOK_URL"
