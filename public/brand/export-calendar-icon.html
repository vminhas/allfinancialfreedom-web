<!DOCTYPE html>
<html>
<head>
  <title>Export Calendar Icon — 180x180 PNG</title>
  <style>
    body { background: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; gap: 20px; }
    canvas { border: 1px solid #ccc; }
    button { padding: 12px 28px; background: #C9A96E; color: #142D48; font-weight: 700; font-size: 1rem; border: none; border-radius: 4px; cursor: pointer; }
    p { color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <p>Your 180×180 calendar icon — click Download to save as PNG</p>
  <canvas id="c" width="180" height="180"></canvas>
  <button onclick="download()">Download calendar-icon.png</button>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Background
    roundRect(ctx, 0, 0, 180, 180, 28, '#142D48');

    // Gold top bar
    roundRect(ctx, 28, 38, 124, 32, 8, '#C9A96E');

    // Calendar body
    roundRect(ctx, 28, 58, 124, 86, 8, '#1B3A5C');

    // Binding rings
    roundRect(ctx, 58, 28, 10, 24, 5, '#0E2035');
    roundRect(ctx, 112, 28, 10, 24, 5, '#0E2035');

    // Grid cells
    const cols = [44, 66, 88, 110, 132];
    const rows = [90, 108, 126];
    rows.forEach(y => {
      cols.forEach((x, i) => {
        const isHighlight = (y === 90 && i === 2);
        roundRect(ctx, x, y, 14, 12, 3, isHighlight ? '#C9A96E' : 'rgba(235,244,255,0.15)');
      });
    });

    // Month label bar
    roundRect(ctx, 44, 64, 60, 8, 2, 'rgba(235,244,255,0.6)');

    function roundRect(ctx, x, y, w, h, r, color) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function download() {
      const a = document.createElement('a');
      a.download = 'calendar-icon.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
