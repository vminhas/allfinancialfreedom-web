<svg viewBox="0 0 420 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Allianz wordmark -->
  <text x="8" y="82" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="72" fill="#003DA5" letter-spacing="-2">Allianz</text>

  <!-- Circle ring -->
  <circle cx="382" cy="55" r="34" fill="none" stroke="#003DA5" stroke-width="5"/>

  <!-- Three bars with notch cuts -->
  <!-- Left bar: notch cut from top-right -->
  <polygon points="360,82 360,34 368,34 368,42 374,42 374,82" fill="#003DA5"/>
  <!-- Center bar: tallest -->
  <polygon points="378,82 378,24 386,24 386,82" fill="#003DA5"/>
  <!-- Right bar: notch cut from top-left -->
  <polygon points="390,82 390,42 396,42 396,34 404,34 404,82" fill="#003DA5"/>
</svg>
