<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 350px;
    height: 180px;
    overflow: hidden;
    background: #142D48;
  }

  .logo {
    width: 350px;
    height: 180px;
    background: #142D48;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 40%, #E8C98A 60%, #C9A96E 80%, transparent 100%);
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #C9A96E 40%, #E8C98A 60%, #C9A96E 80%, transparent 100%);
  }

  .eyebrow {
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 7px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: #C9A96E;
    margin-bottom: 12px;
    font-weight: 500;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 32px;
    font-weight: 300;
    color: #ffffff;
    letter-spacing: 0.06em;
    line-height: 1;
    text-align: center;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A96E, transparent);
    margin: 13px auto;
  }

  .tagline {
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 7px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(201, 169, 110, 0.6);
    font-weight: 400;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 12px;
    height: 12px;
  }
  .corner.tl { top: 10px; left: 10px; border-top: 1px solid rgba(201,169,110,0.4); border-left: 1px solid rgba(201,169,110,0.4); }
  .corner.tr { top: 10px; right: 10px; border-top: 1px solid rgba(201,169,110,0.4); border-right: 1px solid rgba(201,169,110,0.4); }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid rgba(201,169,110,0.4); border-left: 1px solid rgba(201,169,110,0.4); }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid rgba(201,169,110,0.4); border-right: 1px solid rgba(201,169,110,0.4); }
</style>
</head>
<body>
  <div class="logo">
    <div class="top-bar"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <span class="eyebrow">Financial Services</span>
    <div class="wordmark">All Financial Freedom</div>
    <div class="divider"></div>
    <span class="tagline">Wealth &nbsp;·&nbsp; Protection &nbsp;·&nbsp; Legacy</span>

    <div class="bottom-bar"></div>
  </div>
</body>
</html>
